<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新航道在线辅导平台 - Demo导航</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}
.container {
  background: white;
  border-radius: 24px;
  padding: 48px;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
h1 {
  color: #2c3340;
  font-size: 28px;
  margin-bottom: 12px;
  text-align: center;
}
.subtitle {
  color: #8e96a3;
  text-align: center;
  margin-bottom: 40px;
  font-size: 16px;
}
.demo-card {
  background: #f7f8fa;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
  border: 2px solid transparent;
  transition: all 0.3s ease;
}
.demo-card:hover {
  border-color: #5b8def;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(91, 141, 239, 0.15);
}
.demo-title {
  font-size: 18px;
  font-weight: 600;
  color: #2c3340;
  margin-bottom: 8px;
}
.demo-desc {
  font-size: 14px;
  color: #8e96a3;
  margin-bottom: 16px;
  line-height: 1.6;
}
.demo-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #5b8def;
  color: white;
  text-decoration: none;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.2s ease;
}
.demo-link:hover {
  background: #4a7de0;
  transform: scale(1.02);
}
.demo-link svg {
  width: 16px;
  height: 16px;
}
.footer {
  text-align: center;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid #eef2f5;
  color: #8e96a3;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <h1>新航道在线辅导平台</h1>
  <p class="subtitle">iPad Demo 交互原型导航</p>

  <div class="demo-card">
    <div class="demo-title">AI智能答疑 Demo</div>
    <div class="demo-desc">拍照上传题目 → AI智能解答 → 呼叫在线老师流程。支持横竖屏切换体验。</div>
    <a href="ai-tutor.html" class="demo-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="8" y1="21" x2="16" y2="21"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
      </svg>
      打开 Demo
    </a>
  </div>

  <div class="demo-card">
    <div class="demo-title">预约指导 Demo</div>
    <div class="demo-desc">选择科目 → 描述问题 → 选择老师 → 预约时间 → 我的预约完整流程。支持横竖屏切换体验。</div>
    <a href="booking.html" class="demo-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      打开 Demo
    </a>
  </div>

  <div class="footer">
    <p>GitHub Pages 托管 · 推荐使用 iPad 或桌面浏览器访问</p>
  </div>
</div>
</body>
</html>
